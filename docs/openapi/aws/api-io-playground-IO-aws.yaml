openapi: 3.0.1
info:
  title: >-
    ${stageVariables.ProjectName}-${stageVariables.MicroServiceUniqueName}-${stageVariables.IntendedUsage}
  version: hfkJo+VFOl8+Iu3aUmOVOugWXBB5pj//SrG5loNQjdA=
servers:
  - url: https://${stageVariables.DnsName}/{basePath}
    variables:
      basePath:
        default: /${stageVariables.ServiceApiPath}
    x-amazon-apigateway-endpoint-configuration:
      disableExecuteApiEndpoint: true
paths:
  /lollipop-test:
    get:
      summary: Test GET request with Lollipop authentication
      description: |
        Accepts a GET request authenticated via Lollipop headers.
        Returns comprehensive information about the request.
      operationId: testLollipopGet
      tags:
        - Test Endpoints
      parameters:
        - $ref: '#/components/parameters/cxTaxIdAuthFleet'
        - $ref: '#/components/parameters/lollipopOriginalUrl'
        - $ref: '#/components/parameters/lollipopOriginalMethod'
        - $ref: '#/components/parameters/lollipopPublicKey'
        - $ref: '#/components/parameters/lollipopAssertionRef'
        - $ref: '#/components/parameters/lollipopAssertionType'
        - $ref: '#/components/parameters/lollipopAuthJwt'
        - $ref: '#/components/parameters/lollipopUserId'
        - $ref: '#/components/parameters/lollipopSignatureInput'
        - $ref: '#/components/parameters/lollipopSignature'
        - name: query
          in: query
          description: Generic query parameters (all optional)
          required: false
          schema:
            type: object
            additionalProperties: true
          style: form
          explode: true
      responses:
        '200':
          description: Request processed successfully
          headers:
            X-Lambda-Name:
              schema:
                type: string
                example: lollipop-dummy-service
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: '*'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Lollipop authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Authorization denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - pn-auth-fleet_IoAuthorizer_openapi: []
        - api_key_openapi: []
      x-amazon-apigateway-integration:
        uri: >-
          http://${stageVariables.ApplicationLoadBalancerDomain}:8080/${stageVariables.ServiceApiPath}/lollipop-test
        connectionId: ${stageVariables.NetworkLoadBalancerLink}
        httpMethod: ANY
        requestParameters:
          integration.request.header.x-pagopa-pn-cx-id: context.authorizer.cx_id
          integration.request.header.x-pagopa-pn-cx-role: context.authorizer.cx_role
          integration.request.header.x-pagopa-pn-uid: context.authorizer.uid
          integration.request.header.x-pagopa-pn-jti: context.authorizer.cx_jti
          integration.request.header.x-pagopa-pn-cx-type: context.authorizer.cx_type
          integration.request.header.x-pagopa-pn-cx-groups: context.authorizer.cx_groups
          integration.request.header.x-pagopa-pn-src-ch-details: context.authorizer.sourceChannelDetails
          integration.request.header.x-pagopa-pn-src-ch: '''IO'''
        passthroughBehavior: when_no_match
        connectionType: VPC_LINK
        timeoutInMillis: 29000
        type: http_proxy
    post:
      summary: Test POST request with Lollipop authentication
      description: >
        Accepts a POST request with JSON body authenticated via Lollipop
        headers.

        Returns comprehensive information about the request.
      operationId: testLollipopPost
      tags:
        - Test Endpoints
      parameters:
        - $ref: '#/components/parameters/cxTaxIdAuthFleet'
        - $ref: '#/components/parameters/lollipopOriginalUrl'
        - $ref: '#/components/parameters/lollipopOriginalMethod'
        - $ref: '#/components/parameters/lollipopPublicKey'
        - $ref: '#/components/parameters/lollipopAssertionRef'
        - $ref: '#/components/parameters/lollipopAssertionType'
        - $ref: '#/components/parameters/lollipopAuthJwt'
        - $ref: '#/components/parameters/lollipopUserId'
        - $ref: '#/components/parameters/lollipopSignatureInput'
        - $ref: '#/components/parameters/lollipopSignature'
        - name: content-digest
          in: header
          description: SHA-256 digest of the request body (required for POST with body)
          required: false
          schema:
            type: string
            pattern: ^sha-256=:[A-Za-z0-9+/=]+:$
            example: 'sha-256=:X48E9qOokqqrvdts8nOJRJN3OWDUoyWxBf7kbu9DBPE=:'
        - name: query
          in: query
          description: Generic query parameters (all optional)
          required: false
          schema:
            type: object
            additionalProperties: true
          style: form
          explode: true
      requestBody:
        description: Free-form JSON body (any valid JSON structure accepted)
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Any valid JSON object
            examples:
              testData:
                summary: Example test data
                value:
                  testField: test value
                  nestedObject:
                    key: value
                  arrayField:
                    - 1
                    - 2
                    - 3
      responses:
        '200':
          description: Request processed successfully
          headers:
            X-Lambda-Name:
              schema:
                type: string
                example: lollipop-dummy-service
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: '*'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Lollipop authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Authorization denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - pn-auth-fleet_IoAuthorizer_openapi: []
        - api_key_openapi: []
      x-amazon-apigateway-integration:
        uri: >-
          http://${stageVariables.ApplicationLoadBalancerDomain}:8080/${stageVariables.ServiceApiPath}/lollipop-test
        connectionId: ${stageVariables.NetworkLoadBalancerLink}
        httpMethod: ANY
        requestParameters:
          integration.request.header.x-pagopa-pn-cx-id: context.authorizer.cx_id
          integration.request.header.x-pagopa-pn-cx-role: context.authorizer.cx_role
          integration.request.header.x-pagopa-pn-uid: context.authorizer.uid
          integration.request.header.x-pagopa-pn-jti: context.authorizer.cx_jti
          integration.request.header.x-pagopa-pn-cx-type: context.authorizer.cx_type
          integration.request.header.x-pagopa-pn-cx-groups: context.authorizer.cx_groups
          integration.request.header.x-pagopa-pn-src-ch-details: context.authorizer.sourceChannelDetails
          integration.request.header.x-pagopa-pn-src-ch: '''IO'''
        passthroughBehavior: when_no_match
        connectionType: VPC_LINK
        timeoutInMillis: 29000
        type: http_proxy
    options:
      operationId: Options for /lollipop-test API CORS
      x-amazon-apigateway-integration:
        uri: >-
          http://${stageVariables.ApplicationLoadBalancerDomain}:8080/${stageVariables.ServiceApiPath}/lollipop-test
        connectionId: ${stageVariables.NetworkLoadBalancerLink}
        httpMethod: ANY
        requestParameters: {}
        passthroughBehavior: when_no_match
        connectionType: VPC_LINK
        timeoutInMillis: 29000
        type: http_proxy
components:
  parameters:
    cxTaxIdAuthFleet:
      name: x-pagopa-cx-taxid
      in: header
      description: Customer taxId (Italian Codice Fiscale - 16 uppercase characters)
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 16
        pattern: >-
          ^[A-Z]{6}[0-9LMNPQRSTUV]{2}[A-Z]{1}[0-9LMNPQRSTUV]{2}[A-Z]{1}[0-9LMNPQRSTUV]{3}[A-Z]{1}$
      example: RSSMRA80A01H501U
    lollipopOriginalUrl:
      name: x-pagopa-lollipop-original-url
      in: header
      description: The original URL of the protected resource being accessed
      required: true
      schema:
        type: string
        pattern: ^https://api-app\.io\.pagopa\.it/.*$
      example: >-
        https://api-app.io.pagopa.it/api/v1/third-party-messages/01K97R65XAV2VYBVCESA0329CJ
    lollipopOriginalMethod:
      name: x-pagopa-lollipop-original-method
      in: header
      description: The original HTTP method of the protected request
      required: true
      schema:
        type: string
        enum:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
      example: POST
    lollipopPublicKey:
      name: x-pagopa-lollipop-public-key
      in: header
      description: JWK public key encoded in base64
      required: true
      schema:
        type: string
        format: base64
      example: >-
        eyJrdHkiOiJFQyIsImNydiI6IlAtMjU2IiwieCI6IldLbi1aSUdldmN3R0l5eXJ6Rm9aTkJkYXE5X1RzcXpHbDk2b2MwQ1d1aXMiLCJ5IjoieTc3dC1SdkFIUktUc1NHZElZVWZ3ZXVPdndydkRELVEzSHY1SjBmU0tiRSJ9
    lollipopAssertionRef:
      name: x-pagopa-lollipop-assertion-ref
      in: header
      description: SHA-256/384/512 hash reference of the SAML assertion
      required: true
      schema:
        type: string
        pattern: >-
          ^(sha256-[A-Za-z0-9\-_=]{1,44}|sha384-[A-Za-z0-9\-_=]{1,66}|sha512-[A-Za-z0-9\-_=]{1,88})$
      example: sha256-AbCdEfGhIjKlMnOpQrStUvWxYz0123456789
    lollipopAssertionType:
      name: x-pagopa-lollipop-assertion-type
      in: header
      description: Type of assertion (SAML or OIDC)
      required: true
      schema:
        type: string
        enum:
          - SAML
          - OIDC
      example: SAML
    lollipopAuthJwt:
      name: x-pagopa-lollipop-auth-jwt
      in: header
      description: JWT containing the SAML assertion
      required: true
      schema:
        type: string
        pattern: ^[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]*$
      example: >-
        eyJhbGciOiJub25lIn0.eyJzdWIiOiIxMjM0NTY3ODkwIn0.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
    lollipopUserId:
      name: x-pagopa-lollipop-user-id
      in: header
      description: User ID (Italian Codice Fiscale)
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 16
        pattern: >-
          ^[A-Z]{6}[0-9LMNPQRSTUV]{2}[A-Z]{1}[0-9LMNPQRSTUV]{2}[A-Z]{1}[0-9LMNPQRSTUV]{3}[A-Z]{1}$
      example: RSSMRA80A01H501U
    lollipopSignatureInput:
      name: signature-input
      in: header
      description: HTTP Message Signature Input (RFC 9421)
      required: true
      schema:
        type: string
        pattern: ^sig[0-9]+=\([^)]*\);.*alg="[^"]+".*$
      example: >-
        sig1=("@method" "@path"
        "content-digest");created=1234567890;alg="ecdsa-p256-sha256"
    lollipopSignature:
      name: signature
      in: header
      description: HTTP Message Signature (RFC 9421)
      required: true
      schema:
        type: string
        pattern: ^sig[0-9]+=:[A-Za-z0-9+/=]+:$
      example: 'sig1=:SGVsbG8gV29ybGQhIFRoaXMgaXMgYSBkdW1teSBzaWduYXR1cmU=:'
  schemas:
    SuccessResponse:
      type: object
      required:
        - success
        - timestamp
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          required:
            - message
            - timestamp
            - request
          properties:
            message:
              type: string
            timestamp:
              type: string
              format: date-time
            request:
              $ref: '#/components/schemas/RequestInfo'
            requestBody:
              oneOf:
                - type: object
                  additionalProperties: true
                - type: 'null'
            lollipopHeaders:
              type: object
              additionalProperties:
                type: string
            authorizerContext:
              $ref: '#/components/schemas/AuthorizerContext'
            summary:
              $ref: '#/components/schemas/RequestSummary'
    ErrorResponse:
      type: object
      required:
        - success
        - timestamp
        - error
      properties:
        success:
          type: boolean
          enum:
            - false
        timestamp:
          type: string
          format: date-time
        error:
          type: object
          required:
            - message
            - statusCode
          properties:
            message:
              type: string
            statusCode:
              type: number
    RequestInfo:
      type: object
      required:
        - method
        - path
        - hasBody
        - bodyLength
      properties:
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
        path:
          type: string
        requestTime:
          type: string
        queryParameters:
          type: object
          additionalProperties:
            type: string
        hasBody:
          type: boolean
        bodyLength:
          type: number
    AuthorizerContext:
      type: object
      description: Context data passed from the Lollipop Custom Authorizer
      properties:
        userId:
          type: string
        name:
          type: string
        familyName:
          type: string
      additionalProperties: true
    RequestSummary:
      type: object
      properties:
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          oneOf:
            - type: string
            - type: 'null'
        hasAuthorizerContext:
          type: boolean
        authorizerContextKeys:
          type: array
          items:
            type: string
  responses: {}
  securitySchemes:
    api_key_openapi:
      type: apiKey
      name: x-api-key
      in: header
    pn-auth-fleet_LollipopAuthorizer_openapi:
      type: apiKey
      name: x-pagopa-lollipop-auth-jwt
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        authorizerUri: >-
          arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:pn-lollipopAuthorizerLambda/invocations
        authorizerResultTtlInSeconds: 300
        identitySource: >-
          x-pagopa-lollipop-auth-jwt
        type: request
tags:
  - name: Test Endpoints
    description: Testing and debugging endpoints for Lollipop authentication
x-amazon-apigateway-gateway-responses:
  DEFAULT_5XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
  DEFAULT_4XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
  BAD_REQUEST_PARAMETERS:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
    responseTemplates:
      application/json: >-
        {"status": 400, "title": "VALIDATION ERROR", "traceId":
        "$context.xrayTraceId", "errors": [ { "code": "PN_INVALID_PARAMETERS",
        "detail": "Validation errors: $context.error.validationErrorString" } ]}
  BAD_REQUEST_BODY:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
    responseTemplates:
      application/json: >-
        {"status": 400, "title": "VALIDATION ERROR", "traceId":
        "$context.xrayTraceId", "errors": [ { "code": "PN_INVALID_BODY",
        "detail": "Validation errors: $context.error.validationErrorString" } ]}
x-amazon-apigateway-request-validators:
  basic:
    validateRequestBody: true
    validateRequestParameters: true
  params-only:
    validateRequestBody: false
    validateRequestParameters: true
x-amazon-apigateway-request-validator: basic
