# Paths
sonar.sources=src
sonar.tests=src/test
sonar.test.inclusions=src/test/**/*.test.ts

# TypeScript specific
sonar.typescript.lcov.reportPaths=./coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.coverage.exclusions=**/__mocks__/**,**/__test__/**,src/test/**
sonar.exclusions=node_modules/**,dist/**,coverage/**,*.js

# File suffixes
sonar.typescript.file.suffixes=.ts,.tsx
