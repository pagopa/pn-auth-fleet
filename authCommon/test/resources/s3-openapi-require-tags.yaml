openapi: 3.0.3
info:
  title: 'Test RequireTags'
  version: '1.0.0'
paths:
  "/notifications/items":
    get:
      summary: Endpoint con tag matching
      'x-support-role-permissions':
        - support-read
        - support-update
      operationId: withTagMatching
      responses:
        '200':
          description: OK
    put:
      summary: Endpoint con tag support-update
      'x-support-role-permissions':
        - support-update
      operationId: withTagUpdate
      responses:
        '200':
          description: OK
    post:
      summary: Endpoint senza tag
      operationId: noTag
      responses:
        '200':
          description: OK
